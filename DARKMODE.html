<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode Toggle</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    color:#222;
    transition:0.4s;
}

.dark-mode{
    background:#121212;
    color:#f5f5f5;
}

/* Toggle Switch */
.toggle-container{
    text-align:center;
}

.switch{
    position:relative;
    display:inline-block;
    width:70px;
    height:35px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    cursor:pointer;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:#ccc;
    border-radius:50px;
    transition:0.4s;
}

.slider:before{
    position:absolute;
    content:"🌙";
    height:27px;
    width:27px;
    left:4px;
    bottom:4px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    transition:0.4s;
}

input:checked + .slider{
    background:#4a6cff;
}

input:checked + .slider:before{
    transform:translateX(35px);
    content:"☀️";
}
</style>
</head>

<body>

<div class="toggle-container">
    <h2>Dark Mode Toggle</h2>
    <p>Switch between light and dark themes for a better viewing experience.</p>

    <label class="switch">
        <input type="checkbox" id="toggle">
        <span class="slider"></span>
    </label>
</div>

<script>
const toggle = document.getElementById("toggle");

toggle.addEventListener("change", () => {
    document.body.classList.toggle("dark-mode");
});
</script>

</body>
</html>
